<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Zillow Extra Filter</title>
<style>
  :root {
    --ink: #1c2024;
    --muted: #6b7280;
    --line: #e5e7eb;
    --accent: #006aff;
    --bg: #ffffff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    width: 280px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: var(--ink);
    background: var(--bg);
  }
  .wrap { padding: 16px; }
  h1 {
    font-size: 14px;
    font-weight: 600;
    margin: 0 0 2px;
  }
  .sub {
    font-size: 12px;
    color: var(--muted);
    margin: 0 0 16px;
  }
  label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    margin-bottom: 4px;
    margin-top: 12px;
  }
  input {
    width: 100%;
    padding: 6px 8px;
    font-size: 13px;
    border: 1px solid var(--line);
    border-radius: 6px;
    background: var(--bg);
    color: var(--ink);
  }
  input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .hint {
    font-size: 11px;
    color: var(--muted);
    margin-top: 3px;
  }
  button {
    width: 100%;
    margin-top: 16px;
    padding: 8px;
    font-size: 13px;
    font-weight: 600;
    color: #fff;
    background: var(--accent);
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }
  button:active { opacity: 0.85; }
  #status {
    font-size: 11px;
    color: var(--muted);
    margin-top: 8px;
    min-height: 14px;
  }
</style>
</head>
<body>
  <div class="wrap">
    <h1>Extra Filter</h1>
    <p class="sub">Applied on top of Zillow's own filters.</p>

    <label for="minSqftPerBed">Min sqft per bedroom</label>
    <input type="number" id="minSqftPerBed" placeholder="e.g. 250" />

    <label for="maxPricePerSqft">Max price per sqft ($)</label>
    <input type="number" id="maxPricePerSqft" placeholder="e.g. 600" />

    <label for="excludeKeywords">Exclude addresses containing</label>
    <input type="text" id="excludeKeywords" placeholder="comma-separated, e.g. Hwy, Blvd" />
    <p class="hint">Matches against the listing's address text.</p>

    <button id="apply">Apply filters</button>
    <div id="status"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
