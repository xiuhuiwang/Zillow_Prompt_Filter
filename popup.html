<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zillow Custom Filter</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <h1>Zillow Custom Filter</h1>
    <p class="sub">
      Add a criterion Zillow can't filter on (e.g. "has a den"). Your existing
      Zillow filters are read automatically and respected.
    </p>

    <label for="prompt">Your custom criteria</label>
    <textarea
      id="prompt"
      rows="3"
      placeholder="e.g. 1b1b with a den; quiet street; in-unit laundry"
    ></textarea>

    <label for="keyType">Provider</label>
    <select id="keyType">
      <option value="anthropic">Anthropic API key</option>
      <option value="bedrock">AWS Bedrock</option>
    </select>

    <!-- Anthropic fields -->
    <div id="anthropicFields" class="provider-fields">
      <label for="anthropicKey">Anthropic API key</label>
      <input id="anthropicKey" type="password" placeholder="sk-ant-..." />
    </div>

    <!-- Bedrock fields -->
    <div id="bedrockFields" class="provider-fields" hidden>
      <label for="awsAccessKey">AWS Access Key ID</label>
      <input id="awsAccessKey" type="text" placeholder="AKIA..." />
      <label for="awsSecretKey">AWS Secret Access Key</label>
      <input id="awsSecretKey" type="password" placeholder="..." />
      <label for="awsSessionToken">AWS Session Token (optional)</label>
      <input id="awsSessionToken" type="password" placeholder="for temporary creds" />
      <label for="awsRegion">Region</label>
      <input id="awsRegion" type="text" value="us-east-1" placeholder="us-east-1" />
      <p class="warn">
        ⚠️ AWS keys are stored in the browser and signed client-side. Use a
        scoped, short-lived credential — never a root key.
      </p>
    </div>

    <div class="row">
      <label class="checkbox">
        <input id="rememberKey" type="checkbox" checked />
        Remember credentials on this device
      </label>
    </div>

    <button id="testBtn" class="secondary">Test connection</button>
    <button id="runBtn">Filter listings</button>
    <button id="resetBtn" class="secondary">Reset page</button>

    <div id="status" class="status"></div>

    <script src="popup.js"></script>
  </body>
</html>
